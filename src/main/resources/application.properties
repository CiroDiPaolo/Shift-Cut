spring.application.name=shift cut

# --- Base de datos -----------------------------------------------------------
# En Docker, SPRING_DATASOURCE_URL apunta al servicio "db" del compose.
# En local (sin Docker), usa localhost como fallback.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cuts}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- JWT ---------------------------------------------------------------------
# JWT_SECRET debe definirse siempre en produccion via variable de entorno / .env
# NO incluir un valor por defecto en el repositorio: obligamos a inyectarlo por entorno.
jwt.secret=${JWT_SECRET:gD7sJ4pX9qL2vT8mZ1eFwAyKgRbV6hCx}

# --- Servidor ----------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# --- Swagger / OpenAPI -------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
